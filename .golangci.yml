---
run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - unused
    - ineffassign
    - revive
    - gosec

linters-settings:
  gosec:
    excludes:
      - G404  # weak random is fine for tests

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec

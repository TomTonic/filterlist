---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: |
          go test ./... -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1

      - name: Upload coverage
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      - name: Build CLI
        run: go build -o build/regfilter-check ./cmd/regfilter-check

      - name: Run CLI validate
        run: |
          ./build/regfilter-check validate \
            --whitelist testdata/filterlists/whitelist \
            --blacklist testdata/filterlists/blacklist

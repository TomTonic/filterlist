---
name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./... -race -count=1

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 \
            go build -trimpath \
            -o build/filterlist-check-linux-amd64 \
            ./cmd/filterlist-check
          GOOS=linux GOARCH=arm64 \
            go build -trimpath \
            -o build/filterlist-check-linux-arm64 \
            ./cmd/filterlist-check
          GOOS=darwin GOARCH=amd64 \
            go build -trimpath \
            -o build/filterlist-check-darwin-amd64 \
            ./cmd/filterlist-check
          GOOS=darwin GOARCH=arm64 \
            go build -trimpath \
            -o build/filterlist-check-darwin-arm64 \
            ./cmd/filterlist-check

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/filterlist-check-*
          generate_release_notes: true
